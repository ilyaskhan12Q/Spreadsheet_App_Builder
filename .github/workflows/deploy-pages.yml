name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adapters/officejs/package-lock.json

      - name: Install Node Dependencies
        working-directory: adapters/officejs
        run: npm ci

      - name: Build Vite Taskpane
        working-directory: adapters/officejs
        run: npm run build

      - name: Prepare Pages Directory
        run: |
          mkdir -p public
          # Create .nojekyll file to bypass Jekyll processing
          touch public/.nojekyll
          # Copy the dashboard index.html as the root index.html
          cp cli/static/index.html public/index.html
          # Copy the officejs build output to public/taskpane
          cp -r adapters/officejs/dist public/taskpane
          # Also copy taskpane.html to index.html for cleaner urls
          cp public/taskpane/taskpane.html public/taskpane/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public


name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adapters/officejs/package-lock.json

      - name: Install Node Dependencies
        working-directory: adapters/officejs
        run: npm ci

      - name: Build Vite Taskpane
        working-directory: adapters/officejs
        run: npm run build

      - name: Prepare Pages Directory
        run: |
          mkdir -p public
          # Copy the dashboard index.html as the root index.html
          cp cli/static/index.html public/index.html
          # Copy the officejs build output to public/taskpane
          cp -r adapters/officejs/dist public/taskpane

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

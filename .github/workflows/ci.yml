name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Linter
        run: ruff check core cli adapters/uno

      - name: Run Mypy Type Checker
        run: mypy core cli adapters/uno

      - name: Run Pytest
        env:
          PYTHONPATH: .
        run: pytest

  typescript-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adapters/officejs/package-lock.json

      - name: Install Node Dependencies
        working-directory: adapters/officejs
        run: npm ci

      - name: Run TypeScript Compiler Check
        working-directory: adapters/officejs
        run: npx tsc --noEmit

      - name: Run Vitest Unit Tests
        working-directory: adapters/officejs
        run: npm run test
